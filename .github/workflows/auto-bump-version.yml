name: Auto Bump package.json Version

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: auto-bump-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version update
        run: |
          if git diff --quiet package.json package-lock.json; then
            echo "No version changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git push
